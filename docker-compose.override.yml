services:
  backend:
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "3000",
        "--reload",
      ]
    volumes:
      - ./backend:/app
      - skillshelf-data:/var/lib/skillshelf

  frontend:
    build:
      context: ./frontend
      target: dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  frontend-node-modules:
